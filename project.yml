name: JustCount
options:
  bundleIdPrefix: com.justcount
  deploymentTarget:
    iOS: "17.0"
    watchOS: "11.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "65U37J59CY"
    CODE_SIGN_STYLE: Automatic

targets:
  JustCount:
    type: application
    platform: iOS
    sources:
      - path: JustCount
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: JustCount/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.justcount.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: JustCount Watch App
        embed: true
    info:
      path: JustCount/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}

  JustCount Watch App:
    type: application
    platform: watchOS
    sources:
      - path: JustCount Watch App
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: JustCount Watch App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.justcount.app.watchapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: JustCount Watch App/Info.plist
      properties:
        WKCompanionAppBundleIdentifier: com.justcount.app
        WKApplication: true
