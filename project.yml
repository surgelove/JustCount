name: Simply Count
options:
  bundleIdPrefix: com.simplyjustcount
  deploymentTarget:
    iOS: "17.0"
    watchOS: "11.0"
  xcodeVersion: "26.4.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "65U37J59CY"
    CODE_SIGN_STYLE: Automatic

targets:
  Simply Count:
    type: application
    platform: iOS
    sources:
      - path: JustCount
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: JustCount/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.simplyjustcount.app
        ASSETCATALOG_COMPILER_ICON_NAME: iconjustcount
    dependencies:
      - target: Simply Count Watch App
        embed: true
    info:
      path: JustCount/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}

  Simply Count Watch App:
    type: application
    platform: watchOS
    sources:
      - path: JustCount Watch App
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: JustCount Watch App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.simplyjustcount.app.watchapp
        ASSETCATALOG_COMPILER_ICON_NAME: iconjustcount
    info:
      path: JustCount Watch App/Info.plist
      properties:
        WKCompanionAppBundleIdentifier: com.simplyjustcount.app
        WKApplication: true
